<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robust Ads & Profit Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #090b10; --card: #12151c; --border: #21262d; --text: #ffffff; --muted: #8b949e; --blue: #2f80ed; --green: #27ae60; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); border-bottom: 4px solid var(--blue); text-align: center; }
        .card h3 { margin: 0; font-size: 12px; color: var(--muted); text-transform: uppercase; }
        .card .val { font-size: 26px; font-weight: bold; margin-top: 10px; }
        .table-box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); background: #1c2128; }
        input[type="number"] { background: #0d1117; border: 1px solid var(--border); color: white; padding: 5px; border-radius: 4px; width: 70px; }
        .btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .profit { color: var(--green); font-weight: bold; }
        .loss { color: #eb5757; font-weight: bold; }
        #status { color: var(--orange); font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="flex:1">
            <h2 style="margin:0">Facebook Ads Profit Analyzer</h2>
            <div id="status">Waiting for CSV file...</div>
        </div>
        <input type="file" id="fileInp" accept=".csv" onchange="loadFile(event)">
        <button class="btn" onclick="document.getElementById('fileInp').click()">Upload Facebook CSV</button>
    </div>

    <div class="kpi-grid">
        <div class="card"><h3>Total Spend</h3><div class="val" id="totalSpend">$0</div></div>
        <div class="card" style="border-color: var(--green);"><h3>Total Revenue</h3><div class="val" id="totalRev">$0</div></div>
        <div class="card" style="border-color: #f2994a;"><h3>Net Profit</h3><div class="val" id="totalProfit">$0</div></div>
        <div class="card"><h3>ROAS</h3><div class="val" id="totalRoas">0.0</div></div>
    </div>

    <div class="table-box">
        <table id="adTable">
            <thead>
                <tr id="tableHead">
                    <th>Campaign</th>
                    <th>Spend</th>
                    <th>Purchases</th>
                    <th>Product Cost ($)</th>
                    <th>Selling Price ($)</th>
                    <th>Orders (Adj)</th>
                    <th>Revenue</th>
                    <th>Profit</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let adData = [];

        function cleanNum(val) {
            if (!val) return 0;
            // $ চিহ্ন বা কমা সরিয়ে শুধু সংখ্যা রাখা
            return parseFloat(String(val).replace(/[^0-9.-]+/g, "")) || 0;
        }

        function loadFile(event) {
            const file = event.target.files[0];
            document.getElementById('status').innerText = "Loading: " + file.name;
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("Parsed Data:", results.data); // ব্রাউজার কনসোলে ডাটা চেক করার জন্য
                    adData = results.data;
                    renderTable();
                }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            adData.forEach((row, index) => {
                // কলামের নাম যাই হোক না কেন, ডাটা খুঁজে বের করার চেষ্টা
                const campaign = row.Campaign || row['Campaign name'] || row['Ad Set Name'] || "Unknown";
                const spend = cleanNum(row['Amount Spent'] || row.Spend || row['Amount spent (USD)']);
                const purchase = cleanNum(row.PURCHASE || row.Results || row.Purchase || 0);

                if (spend === 0 && purchase === 0) return; // ফালতু রো বাদ দেয়া

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${campaign}</td>
                    <td>$${spend.toFixed(2)}</td>
                    <td>${purchase}</td>
                    <td><input type="number" value="10" oninput="calculateProfit(${index}, this.parentElement.parentElement)"></td>
                    <td><input type="number" value="50" oninput="calculateProfit(${index}, this.parentElement.parentElement)"></td>
                    <td><input type="number" value="${purchase}" oninput="calculateProfit(${index}, this.parentElement.parentElement)"></td>
                    <td class="row-rev">$0</td>
                    <td class="row-profit">$0</td>
                `;
                tbody.appendChild(tr);
                calculateProfit(index, tr, spend);
            });
            document.getElementById('status').innerText = "Data Loaded Successfully!";
        }

        function calculateProfit(index, tr, fixedSpend = null) {
            const row = adData[index];
            const spend = fixedSpend !== null ? fixedSpend : cleanNum(row['Amount Spent'] || row.Spend || row['Amount spent (USD)']);
            
            const cost = parseFloat(tr.cells[3].querySelector('input').value) || 0;
            const price = parseFloat(tr.cells[4].querySelector('input').value) || 0;
            const orders = parseFloat(tr.cells[5].querySelector('input').value) || 0;

            const revenue = price * orders;
            const profit = revenue - (spend + (cost * orders));

            tr.cells[6].innerText = '$' + revenue.toFixed(2);
            tr.cells[7].innerText = '$' + profit.toFixed(2);
            tr.cells[7].className = profit >= 0 ? 'profit' : 'loss';

            updateSummary();
        }

        function updateSummary() {
            let tSpend = 0, tRev = 0, tProfit = 0;
            const rows = document.querySelectorAll('#tableBody tr');
            
            rows.forEach(row => {
                tSpend += parseFloat(row.cells[1].innerText.replace('$', '')) || 0;
                tRev += parseFloat(row.cells[6].innerText.replace('$', '')) || 0;
                tProfit += parseFloat(row.cells[7].innerText.replace('$', '')) || 0;
            });

            document.getElementById('totalSpend').innerText = '$' + tSpend.toLocaleString();
            document.getElementById('totalRev').innerText = '$' + tRev.toLocaleString();
            document.getElementById('totalProfit').innerText = '$' + tProfit.toLocaleString();
            document.getElementById('totalRoas').innerText = tSpend > 0 ? (tRev / tSpend).toFixed(2) : '0.0';
        }
    </script>
</body>
</html>
